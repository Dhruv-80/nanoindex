name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (without Numba)
        run: pytest tests/ -v --ignore=tests/test_benchmarks.py

  test-fast:
    name: Test with Numba (Python 3.12, ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core + fast + dev dependencies
        run: pip install -e ".[dev,fast]"

      - name: Run tests (with Numba)
        run: pytest tests/ -v --ignore=tests/test_benchmarks.py

  test-benchmarks:
    name: Benchmark baselines (Python 3.12, ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with bench extras
        run: pip install -e ".[dev,bench]"

      - name: Run benchmark tests
        run: pytest tests/test_benchmarks.py -v

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting and imports
        run: ruff check src/nanoindex tests
